<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenWendy — Dashboard</title>
<link rel="stylesheet" href="/static/vendor/drawflow.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn-hamburger" onclick="toggleSidebar()">☰</button>
    <span class="logo">🌸 OpenWendy</span>
  </div>
  <div class="topbar-center">
    <input id="pipeline-name" placeholder="Pipeline name" value="Default">
    <button class="btn" onclick="showLoadModal()">📂 Load</button>
    <button class="btn btn-save" onclick="savePipeline()">💾 Save</button>
    <button class="btn" onclick="showImportModal()">📥 Import</button>
    <button class="btn btn-run" onclick="runPipeline()">▶ Run</button>
    <button class="btn" onclick="stopPipeline()">⏹ Stop</button>
    <span id="runtime-status" style="font-size:12px">🔴 Stopped</span>
    <span id="status-msg"></span>
  </div>
</div>

<!-- Main Layout -->
<div id="main">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-title">📦 Nodes</div>
    <div class="sidebar-hint">Double-tap to add</div>

    <div style="font-size:10px;color:#666;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">📥 Input/Output</div>
    <div class="node-item" data-type="input" draggable="true" ondragstart="dragStart(event)">📥 Input</div>
    <div class="node-item" data-type="output" draggable="true" ondragstart="dragStart(event)">📤 Output</div>

    <div style="font-size:10px;color:#666;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">🌸 Wendy</div>
    <div class="node-item" data-type="wendy" draggable="true" ondragstart="dragStart(event)">🌸 Wendy</div>
    <div class="node-item" data-type="avatar" draggable="true" ondragstart="dragStart(event)">👤 Avatar</div>

    <div style="font-size:10px;color:#666;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">🔀 Logic</div>
    <div class="node-item" data-type="filter" draggable="true" ondragstart="dragStart(event)">🔀 Filter</div>
    <div class="node-item" data-type="prompt" draggable="true" ondragstart="dragStart(event)">📝 Prompt</div>
    <div class="node-item" data-type="heartbeat" draggable="true" ondragstart="dragStart(event)">💓 Heartbeat</div>

    <div style="font-size:10px;color:#666;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px">🎨 Generate</div>
    <div class="node-item" data-type="voice" draggable="true" ondragstart="dragStart(event)">🔊 Voice TTS</div>
    <div class="node-item" data-type="image-gen" draggable="true" ondragstart="dragStart(event)">🖼️ Image Gen</div>
    <div class="node-item" data-type="video-gen" draggable="true" ondragstart="dragStart(event)">🎬 Video Gen</div>
    <div class="node-item" data-type="live-vid-stream" draggable="true" ondragstart="dragStart(event)">📹 Live Vid</div>
  </div>

  <!-- Canvas -->
  <div id="drawflow" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
</div>

<!-- Log Panel -->
<div id="log-panel">
  <div id="log-header" onclick="toggleLogPanel()">
    <span>📋 Logs</span>
    <span id="log-toggle">▲</span>
  </div>
  <div id="log-body"></div>
</div>

<!-- Load Modal -->
<div class="modal hidden" id="load-modal">
  <div class="modal-content">
    <div class="modal-header"><span>📂 Load Pipeline</span><button class="btn-close" onclick="closeLoadModal()">✕</button></div>
    <div id="pipeline-list"></div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal hidden" id="import-modal">
  <div class="modal-content">
    <div class="modal-header"><span>📥 Import Pipeline</span><button class="btn-close" onclick="closeImportModal()">✕</button></div>
    <div class="field"><label>Paste JSON or URL</label><textarea id="import-text" rows="8" style="width:100%;background:#0a0a1a;border:1px solid #2a2a4a;color:#ccc;padding:10px;border-radius:6px;font-size:12px;font-family:monospace;resize:vertical"></textarea></div>
    <div style="margin-top:10px"><button class="btn btn-primary" style="width:100%" onclick="doImport()">Import</button></div>
  </div>
</div>

<script src="/static/vendor/drawflow.min.js"></script>
<script src="/static/app.js"></script>

<!-- Log panel styles -->
<style>
#log-panel{position:fixed;bottom:0;left:0;right:0;background:#0a0a1a;border-top:1px solid #2a2a4a;z-index:500;transition:height .3s}
#log-panel.collapsed{height:32px}
#log-panel:not(.collapsed){height:220px}
#log-header{display:flex;justify-content:space-between;align-items:center;padding:6px 16px;cursor:pointer;font-size:12px;color:#888;background:#12122a;border-bottom:1px solid #2a2a4a}
#log-body{height:calc(100% - 32px);overflow-y:auto;padding:8px 16px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;line-height:1.6;color:#80cfa9}
.log-error{color:#ff6b6b}
.log-warn{color:#e0a060}
.log-info{color:#80cfa9}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:4px}
.btn-primary{background:#e94560;color:#fff;border:none;padding:10px;border-radius:6px;font-size:13px;cursor:pointer}
</style>

<script>
// Log panel
const logPanel = document.getElementById('log-panel');
const logBody = document.getElementById('log-body');
logPanel.classList.add('collapsed');

function toggleLogPanel() {
  logPanel.classList.toggle('collapsed');
  document.getElementById('log-toggle').textContent = logPanel.classList.contains('collapsed') ? '▲' : '▼';
}

// SSE log stream
let logSource = null;
function connectLogs() {
  if (logSource) logSource.close();
  logSource = new EventSource('/api/runtime/logs');
  logSource.onmessage = (e) => {
    if (e.data === '[keepalive]') return;
    const div = document.createElement('div');
    const line = e.data;
    div.textContent = line;
    if (line.includes('ERROR') || line.includes('error')) div.className = 'log-error';
    else if (line.includes('WARNING') || line.includes('warn')) div.className = 'log-warn';
    else div.className = 'log-info';
    logBody.appendChild(div);
    logBody.scrollTop = logBody.scrollHeight;
  };
  logSource.onerror = () => { setTimeout(connectLogs, 3000); };
}
connectLogs();

// Runtime status polling
async function checkStatus() {
  try {
    const r = await fetch('/api/runtime/status');
    const d = await r.json();
    document.getElementById('runtime-status').textContent = d.running ? '🟢 Running' : '🔴 Stopped';
  } catch(e) {}
}
setInterval(checkStatus, 5000);
checkStatus();

// Run / Stop
async function runPipeline() {
  const name = document.getElementById('pipeline-name').value.trim() || 'default';
  // Save first
  await savePipeline();
  const r = await fetch('/api/runtime/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pipeline: name}) });
  if (r.ok) { showStatus('▶ Runtime started'); checkStatus(); logPanel.classList.remove('collapsed'); }
  else showStatus('⚠ Failed to start');
}

async function stopPipeline() {
  await fetch('/api/runtime/stop', { method:'POST' });
  showStatus('⏹ Runtime stopped');
  checkStatus();
}

// Import
function showImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }

async function doImport() {
  let text = document.getElementById('import-text').value.trim();
  if (!text) return;
  try {
    // If URL, fetch it
    if (text.startsWith('http')) {
      const r = await fetch(text);
      text = await r.text();
    }
    const data = JSON.parse(text);
    document.getElementById('pipeline-name').value = data.name || 'imported';
    loadPipelineData(data);
    closeImportModal();
    showStatus('✅ Pipeline imported');
  } catch(e) {
    showStatus('⚠ Invalid JSON: ' + e.message);
  }
}

// Load default pipeline on start
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fetch('/api/pipelines/default');
    if (r.ok) {
      const data = await r.json();
      loadPipelineData(data);
    }
  } catch(e) {}
});
</script>
</body>
</html>
